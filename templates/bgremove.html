<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Creativify — Removedor de Fundo</title>
<style>
:root{
  --bg:#0a0a0d;--surface:#13131a;--surface2:#1c1c26;--border:#25253a;--border2:#32324a;
  --text:#eeeef5;--text2:#8888aa;--text3:#5a5a72;--accent:#22c97a;--accent-dim:#22c97a15;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:-apple-system,'Segoe UI',system-ui,sans-serif;font-size:14px;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:40px 16px;}
.back{position:fixed;top:16px;left:16px;color:var(--text2);text-decoration:none;font-weight:600;font-size:13px;background:var(--surface);border:1px solid var(--border);padding:8px 14px;border-radius:9px;z-index:10;}
.back:hover{color:var(--text);}
.wrap{width:100%;max-width:640px;}
.header{text-align:center;margin-bottom:24px;}
.header .ico{font-size:42px;margin-bottom:10px;}
.header h1{font-size:26px;font-weight:800;letter-spacing:-.02em;margin-bottom:6px;}
.header p{font-size:14px;color:var(--text2);}

.card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:24px;margin-bottom:14px;}

/* upload */
.drop{border:2px dashed var(--border2);border-radius:14px;padding:48px 20px;text-align:center;cursor:pointer;transition:.15s;}
.drop:hover,.drop.over{border-color:var(--accent);background:var(--accent-dim);}
.drop .dico{font-size:40px;margin-bottom:12px;}
.drop .dt{font-size:16px;font-weight:600;margin-bottom:6px;}
.drop .ds{font-size:13px;color:var(--text3);}
input[type=file]{display:none;}

/* processing */
.processing{text-align:center;padding:40px 20px;display:none;}
.processing.show{display:block;}
.processing .pimg{max-width:100%;max-height:300px;border-radius:12px;opacity:.5;margin-bottom:20px;}
.bar{height:6px;background:var(--border2);border-radius:3px;overflow:hidden;max-width:280px;margin:0 auto 12px;}
.bar-fill{height:100%;background:linear-gradient(90deg,#22c97a,#5ee8a8);border-radius:3px;width:0%;animation:load 8s ease-out forwards;}
@keyframes load{0%{width:0}30%{width:55%}70%{width:82%}100%{width:94%}}
.processing .ptext{font-size:14px;color:var(--text2);}

/* before/after result */
.result{display:none;}
.result.show{display:block;}
.compare{position:relative;border-radius:14px;overflow:hidden;user-select:none;background-image:linear-gradient(45deg,#1c1c26 25%,transparent 25%),linear-gradient(-45deg,#1c1c26 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#1c1c26 75%),linear-gradient(-45deg,transparent 75%,#1c1c26 75%);background-size:20px 20px;background-position:0 0,0 10px,10px -10px,-10px 0;cursor:ew-resize;}
.compare img{display:block;width:100%;pointer-events:none;}
.compare .after-wrap{position:absolute;inset:0;overflow:hidden;width:50%;border-right:2px solid #fff;}
.compare .after-wrap img{position:absolute;top:0;left:0;height:100%;width:auto;max-width:none;}
/* keep both images same rendered size */
.compare .base{width:100%;display:block;}
.compare .after-wrap{height:100%;}
.handle{position:absolute;top:0;bottom:0;left:50%;width:2px;background:#fff;pointer-events:none;}
.handle .knob{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:36px;height:36px;border-radius:50%;background:#fff;box-shadow:0 2px 8px #0006;display:flex;align-items:center;justify-content:center;color:#111;font-size:14px;font-weight:700;}
.labels{display:flex;justify-content:space-between;margin-top:10px;font-size:12px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;}

.bg-opts{margin-top:18px;}
.bg-opts label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text3);display:block;margin-bottom:9px;}
.swatches{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.sw{width:38px;height:38px;border-radius:9px;cursor:pointer;border:2px solid var(--border2);transition:.15s;}
.sw.active{border-color:var(--accent);transform:scale(1.05);}
.sw.transparent{background-image:linear-gradient(45deg,#888 25%,transparent 25%),linear-gradient(-45deg,#888 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#888 75%),linear-gradient(-45deg,transparent 75%,#888 75%);background-size:10px 10px;background-position:0 0,0 5px,5px -5px,-5px 0;background-color:#fff;}
.sw-custom{position:relative;overflow:hidden;}
.sw-custom input{position:absolute;inset:-4px;cursor:pointer;opacity:0;}

.actions{display:flex;gap:10px;margin-top:20px;}
.btn{flex:1;border:none;border-radius:11px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;}
.btn-primary{background:var(--accent);color:#03150a;}
.btn-primary:hover{filter:brightness(1.08);}
.btn-ghost{background:var(--surface2);color:var(--text2);border:1px solid var(--border);}
.btn-ghost:hover{color:var(--text);}

.err{display:none;background:#ff4f4f15;border:1px solid #ff4f4f33;color:#ff8a8a;border-radius:10px;padding:12px 14px;font-size:13px;margin-top:14px;}
.err.show{display:block;}
.footer{text-align:center;font-size:11px;color:var(--text3);margin-top:18px;}
</style>
</head>
<body>
<a class="back" href="/">← Voltar</a>
<div class="wrap">
  <div class="header">
    <div class="ico">🪄</div>
    <h1>Removedor de Fundo</h1>
    <p>Remova o fundo de qualquer imagem com um clique</p>
  </div>

  <div class="card">
    <!-- upload state -->
    <div id="upload-state">
      <div class="drop" id="drop">
        <div class="dico">🖼️</div>
        <div class="dt">Arraste uma imagem ou clique aqui</div>
        <div class="ds">JPG · PNG · WebP — pessoas, produtos, objetos</div>
      </div>
      <input type="file" id="fileInput" accept="image/*">
    </div>

    <!-- processing state -->
    <div class="processing" id="processing">
      <img id="preview" class="pimg" alt="">
      <div class="bar"><div class="bar-fill"></div></div>
      <div class="ptext">✨ A IA está removendo o fundo...</div>
    </div>

    <!-- result state -->
    <div class="result" id="result">
      <div class="compare" id="compare">
        <img class="base" id="img-after-full" alt="resultado">
        <div class="after-wrap" id="afterWrap">
          <img id="img-before" alt="original">
        </div>
        <div class="handle" id="handle"><div class="knob">⇄</div></div>
      </div>
      <div class="labels"><span>← Original</span><span>Sem fundo →</span></div>

      <div class="bg-opts">
        <label>Fundo do resultado</label>
        <div class="swatches" id="swatches">
          <div class="sw transparent active" data-bg="transparent" title="Transparente"></div>
          <div class="sw" data-bg="white" style="background:#fff" title="Branco"></div>
          <div class="sw" data-bg="color" data-color="#000000" style="background:#000" title="Preto"></div>
          <div class="sw" data-bg="color" data-color="#22c97a" style="background:#22c97a" title="Verde"></div>
          <div class="sw" data-bg="color" data-color="#7c6dff" style="background:#7c6dff" title="Roxo"></div>
          <div class="sw" data-bg="color" data-color="#ff5c5c" style="background:#ff5c5c" title="Vermelho"></div>
          <div class="sw sw-custom" data-bg="color" title="Personalizado" style="background:conic-gradient(red,yellow,lime,cyan,blue,magenta,red)">
            <input type="color" id="customColor" value="#3399ff">
          </div>
        </div>
      </div>

      <div class="actions">
        <button class="btn btn-ghost" id="btn-new">Nova imagem</button>
        <button class="btn btn-primary" id="btn-download">⬇ Baixar PNG</button>
      </div>
    </div>

    <div class="err" id="err"></div>
  </div>

  <div class="footer">Processado de forma privada · imagens deletadas em 10 minutos</div>
</div>

<script>
var fileInput=document.getElementById('fileInput');
var drop=document.getElementById('drop');
var originalFile=null, originalURL=null, currentBlob=null, currentBg='transparent', currentColor='#ffffff';

drop.onclick=function(){ fileInput.click(); };
fileInput.onchange=function(){ if(fileInput.files[0]) start(fileInput.files[0]); };
drop.ondragover=function(e){ e.preventDefault(); drop.classList.add('over'); };
drop.ondragleave=function(){ drop.classList.remove('over'); };
drop.ondrop=function(e){ e.preventDefault(); drop.classList.remove('over'); if(e.dataTransfer.files[0]) start(e.dataTransfer.files[0]); };

function show(state){
  document.getElementById('upload-state').style.display = state==='upload'?'block':'none';
  document.getElementById('processing').className = 'processing' + (state==='processing'?' show':'');
  document.getElementById('result').className = 'result' + (state==='result'?' show':'');
}
function showErr(msg){
  var e=document.getElementById('err'); e.textContent='❌ '+msg; e.className='err show';
}

function start(file){
  originalFile=file;
  if(originalURL) URL.revokeObjectURL(originalURL);
  originalURL=URL.createObjectURL(file);
  document.getElementById('preview').src=originalURL;
  document.getElementById('img-before').src=originalURL;
  document.getElementById('err').className='err';
  show('processing');
  process('transparent','#ffffff');
}

function process(bg, color){
  var fd=new FormData();
  fd.append('file', originalFile);
  fd.append('bg', bg);
  fd.append('color', color);
  fetch('/t/bgremove/api/bg/remove',{method:'POST',body:fd})
  .then(function(r){ if(!r.ok) return r.json().then(function(j){ throw new Error(j.error||'Erro'); }); return r.blob(); })
  .then(function(blob){
    currentBlob=blob;
    var url=URL.createObjectURL(blob);
    document.getElementById('img-after-full').src=url;
    show('result');
    setTimeout(initCompare, 50);
  })
  .catch(function(e){ show('upload'); showErr(e.message); });
}

/* before/after slider */
function initCompare(){
  var compare=document.getElementById('compare');
  var afterWrap=document.getElementById('afterWrap');
  var handle=document.getElementById('handle');
  var baseImg=document.getElementById('img-after-full');
  var beforeImg=document.getElementById('img-before');
  // match the before image width to the rendered base width
  function sync(){ beforeImg.style.width=compare.clientWidth+'px'; beforeImg.style.height=baseImg.clientHeight+'px'; }
  sync(); window.onresize=sync;
  function setPos(clientX){
    var rect=compare.getBoundingClientRect();
    var x=Math.max(0,Math.min(clientX-rect.left,rect.width));
    var pct=(x/rect.width)*100;
    afterWrap.style.width=pct+'%';
    handle.style.left=pct+'%';
  }
  var dragging=false;
  compare.onmousedown=function(e){ dragging=true; setPos(e.clientX); };
  document.addEventListener('mousemove',function(e){ if(dragging) setPos(e.clientX); });
  document.addEventListener('mouseup',function(){ dragging=false; });
  compare.ontouchstart=function(e){ dragging=true; setPos(e.touches[0].clientX); };
  compare.ontouchmove=function(e){ if(dragging){ setPos(e.touches[0].clientX); e.preventDefault(); } };
  compare.ontouchend=function(){ dragging=false; };
}

/* background swatches */
var swatches=document.getElementById('swatches');
swatches.addEventListener('click',function(e){
  var sw=e.target.closest('.sw');
  if(!sw) return;
  var all=swatches.querySelectorAll('.sw');
  for(var i=0;i<all.length;i++) all[i].classList.remove('active');
  sw.classList.add('active');
  currentBg=sw.dataset.bg;
  if(sw.dataset.color) currentColor=sw.dataset.color;
  if(sw.classList.contains('sw-custom')) currentColor=document.getElementById('customColor').value;
  reprocess();
});
document.getElementById('customColor').oninput=function(){
  currentColor=this.value;
  var all=swatches.querySelectorAll('.sw');
  for(var i=0;i<all.length;i++) all[i].classList.remove('active');
  this.closest('.sw').classList.add('active');
  currentBg='color';
  reprocess();
};
function reprocess(){
  if(!originalFile) return;
  show('processing');
  process(currentBg, currentColor);
}

document.getElementById('btn-download').onclick=function(){
  if(!currentBlob) return;
  var url=URL.createObjectURL(currentBlob);
  var a=document.createElement('a'); a.href=url; a.download='sem_fundo.png';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
};
document.getElementById('btn-new').onclick=function(){
  originalFile=null; currentBlob=null;
  fileInput.value='';
  show('upload');
};
</script>
</body>
</html>
